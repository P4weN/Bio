<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="description" content="PaweN Bio">
    <meta name="keywords" content="PaweN, Bio, Photo">
    <meta name="author" content="PaweN">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="d.jpg">
    <link rel="stylesheet" href="style.css">
    <title>PaweN</title>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="miasto.mp4" type="video/mp4">
    </video>
    <div class="bio">
        <img src="d.jpg" alt="guitar" id="gitara">
        <h1>PaweN</h1>
        <h4>Coś tam działam w kodowaniu💻 i cykam foty📸.<br>Moge zagrać ci szante na gitarze🎸</h4>
        <div class="button" onclick="window.open('https://www.flickr.com/photos/200464707@N08/', '_blank')">
            <img src="flickr.png" alt="flickr logo" class="logo">
            <div class="text">
                <h4 class="ha">Flickr</h4>
                <p>Pełna galeria – wszystkie moje najlepsze ujęcia</p>
            </div>
        </div> 
        <div class="button" onclick="window.open('https://www.instagram.com/_Pawen_photographyy/', '_blank')">
            <img src="Instagram.webp" alt="instagram logo" class="logo">
            <div class="text">
                <h4 class="ha">Instagram</h4>
                <p>Wybrane zdjęcia z podróż i ciekawych miejsc</p>
            </div>
        </div>
        <div class="button" onclick="window.open('https://p4wen.github.io/GenPass/', '_blank')">
            <img src="Genpass.png" alt="GenPass logo" class="logo">
            <div class="text">
                <h4 class="ha">GenPass</h4>
                <p>Moja strona - generator haseł</p>
            </div>
        </div>
    </div>
    <audio id="audio" loop>
        <source src="muzyka.mp3" type="audio/mpeg">
    </audio>
    <button id="muzyka-btn" onclick="toggleAudio()">🔇</button>
<script>
function toggleAudio() {
    const audio = document.getElementById('audio');
    const btn = document.getElementById('muzyka-btn');
    if (audio.paused) {
        audio.play();
        btn.textContent = '🔊';
    } else {
        audio.pause();
        btn.textContent = '🔇';
    }
}
</script>
</body>
</html>
